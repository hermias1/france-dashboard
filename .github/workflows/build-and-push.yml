name: Build and Push to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: hermias1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    name: Build and Push Images to GHCR
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: france-dashboard-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: france-dashboard-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - service: france-dashboard-ingest
            context: ./ingest
            dockerfile: ./ingest/Dockerfile

    outputs:
      backend-digest: ${{ steps.export-digest.outputs.backend-digest }}
      frontend-digest: ${{ steps.export-digest.outputs.frontend-digest }}
      ingest-digest: ${{ steps.export-digest.outputs.ingest-digest }}
      calver: ${{ steps.meta.outputs.CALVER }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute build metadata
        id: meta
        run: |
          echo "CALVER=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:calver-${{ steps.meta.outputs.CALVER }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        id: export-digest
        run: |
          SERVICE_KEY=$(echo "${{ matrix.service }}" | sed 's/france-dashboard-//')
          DIGEST="${{ steps.build.outputs.digest }}"
          echo "${SERVICE_KEY}-digest=${DIGEST}" >> "$GITHUB_OUTPUT"

  update-homelab-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    name: Update Homelab Deployment Manifests
    if: success()

    steps:
      - name: Checkout homelab repository
        uses: actions/checkout@v4
        with:
          repository: hermias1/HomeLab
          token: ${{ secrets.HOMELAB_REPO_TOKEN }}
          path: homelab

      - name: Update deployment manifests
        env:
          CALVER: ${{ needs.build-and-push.outputs.calver }}
          BACKEND_DIGEST: ${{ needs.build-and-push.outputs.backend-digest }}
          FRONTEND_DIGEST: ${{ needs.build-and-push.outputs.frontend-digest }}
          INGEST_DIGEST: ${{ needs.build-and-push.outputs.ingest-digest }}
        run: |
          APPS_DIR="homelab/clusters/homelab/apps/france-dashboard"

          if [ -n "$BACKEND_DIGEST" ] && [ -f "$APPS_DIR/backend/01-deployment.yaml" ]; then
            sed -i "s|image: ghcr.io/${{ env.IMAGE_OWNER }}/france-dashboard-backend.*|image: ghcr.io/${{ env.IMAGE_OWNER }}/france-dashboard-backend:calver-${CALVER}@${BACKEND_DIGEST} # Updated by CI|" \
              "$APPS_DIR/backend/01-deployment.yaml"
            echo "Updated backend deployment"
          fi

          if [ -n "$FRONTEND_DIGEST" ] && [ -f "$APPS_DIR/frontend/01-deployment.yaml" ]; then
            sed -i "s|image: ghcr.io/${{ env.IMAGE_OWNER }}/france-dashboard-frontend.*|image: ghcr.io/${{ env.IMAGE_OWNER }}/france-dashboard-frontend:calver-${CALVER}@${FRONTEND_DIGEST} # Updated by CI|" \
              "$APPS_DIR/frontend/01-deployment.yaml"
            echo "Updated frontend deployment"
          fi

          if [ -n "$INGEST_DIGEST" ] && [ -f "$APPS_DIR/ingest/01-cronjob.yaml" ]; then
            sed -i "s|image: ghcr.io/${{ env.IMAGE_OWNER }}/france-dashboard-ingest.*|image: ghcr.io/${{ env.IMAGE_OWNER }}/france-dashboard-ingest:calver-${CALVER}@${INGEST_DIGEST} # Updated by CI|" \
              "$APPS_DIR/ingest/01-cronjob.yaml"
            echo "Updated ingest cronjob"
          fi

      - name: Commit and push to homelab
        run: |
          cd homelab
          git config user.name "France Dashboard CI"
          git config user.email "ci@francedashboard.fr"

          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git add clusters/homelab/apps/france-dashboard/
          git commit -m "chore(france-dashboard): deploy calver-${{ needs.build-and-push.outputs.calver }}"
          git push

  cleanup-old-images:
    runs-on: ubuntu-latest
    needs: build-and-push
    name: Cleanup Old Container Images
    if: success()
    permissions:
      packages: write

    strategy:
      matrix:
        service:
          - france-dashboard-backend
          - france-dashboard-frontend
          - france-dashboard-ingest

    steps:
      - name: Delete old image versions
        continue-on-error: true
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.service }}
          package-type: container
          min-versions-to-keep: 2
          owner: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
